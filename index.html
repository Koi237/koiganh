<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cờ Gánh</title>
<style>
  :root {
    --bg: #1b1714;
    --panel: #262019;
    --line: #8a7355;
    --board: #d9bb8a;
    --board2: #c9a877;
    --white: #f5efe3;
    --black: #2c2622;
    --accent: #d98b3a;
    --text: #e8ddcb;
    --muted: #a2957f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
  }
  h1 {
    font-size: 22px;
    margin: 4px 0 10px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  #status {
    font-size: 15px;
    min-height: 22px;
    margin-bottom: 8px;
    text-align: center;
    color: var(--accent);
  }
  #boardWrap {
    position: relative;
    width: min(92vw, 380px);
    height: min(92vw, 380px);
    background: var(--board);
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,.45);
    touch-action: manipulation;
  }
  svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .pt {
    cursor: pointer;
  }
  .piece-w { fill: var(--white); stroke: #b9ac96; stroke-width: 1.5; }
  .piece-b { fill: var(--black); stroke: #6a5c4d; stroke-width: 1.5; }
  .empty   { fill: rgba(0,0,0,.18); }
  .sel     { stroke: var(--accent); stroke-width: 3.5; }
  .hint    { fill: var(--accent); opacity: .55; }
  #panel {
    margin-top: 14px;
    width: min(92vw, 380px);
    background: var(--panel);
    border-radius: 8px;
    padding: 12px;
  }
  button {
    background: var(--accent);
    color: #1b1714;
    border: 0;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-bottom: 8px;
  }
  button:disabled { opacity: .4; cursor: default; }
  button.ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  #linkBox {
    display: none;
    margin-top: 6px;
  }
  #link {
    width: 100%;
    background: #17130f;
    color: var(--text);
    border: 1px solid #3a3128;
    border-radius: 6px;
    padding: 8px;
    font-size: 12px;
    font-family: monospace;
  }
  .small { font-size: 12px; color: var(--muted); line-height: 1.5; margin: 6px 0 0; }
  #players { display: flex; gap: 8px; margin-bottom: 12px; }
  .pcard {
    flex: 1;
    background: #17130f;
    border: 2px solid #3a3128;
    border-radius: 8px;
    padding: 9px 8px;
    text-align: center;
    transition: border-color .2s, background .2s;
  }
  .pcard.active {
    border-color: var(--accent);
    background: #241a10;
  }
  .pcard .who { font-size: 13px; font-weight: 600; }
  .pcard .cnt { font-size: 20px; font-weight: 700; margin: 3px 0 1px; }
  .pcard .st  { font-size: 11px; color: var(--muted); min-height: 14px; }
  .pcard.active .st { color: var(--accent); }
  .dot { display:inline-block; width:11px; height:11px; border-radius:50%; vertical-align:-1px; margin-right:5px; }
  #copyBtn { background: #3a3128; color: var(--text); }
  #copyBtn.ok { background: #4a7c3f; color: #fff; }
</style>
</head>
<body>

<h1>CỜ GÁNH</h1>
<div id="status">Đang khởi tạo…</div>

<div id="boardWrap">
  <svg id="board" viewBox="0 0 100 100"></svg>
</div>

<div id="panel">
  <div id="players">
    <div class="pcard" id="pw">
      <div class="who"><span class="dot" style="background:var(--white)"></span>Trắng</div>
      <div class="cnt" id="cw">8</div>
      <div class="st" id="sw">—</div>
    </div>
    <div class="pcard" id="pb">
      <div class="who"><span class="dot" style="background:var(--black);border:1px solid #6a5c4d"></span>Đen</div>
      <div class="cnt" id="cb">8</div>
      <div class="st" id="sb">—</div>
    </div>
  </div>
  <button id="createBtn">Tạo ván mới</button>
  <div id="linkBox">
    <input id="link" readonly onclick="this.select()">
    <button id="copyBtn" style="margin-top:8px">📋 Sao chép link</button>
    <p class="small">Gửi link này cho bạn của bạn. Cả hai phải mở cùng lúc.</p>
  </div>
  <button id="drawBtn" class="ghost" style="display:none">Xin hòa</button>
  <button id="rematchBtn" class="ghost" style="display:none">Chơi lại</button>
  <p class="small">
    <b>Luật:</b> Đi 1 bước theo đường kẻ. <b>Gánh:</b> quân địch bị kẹp hai đầu sẽ đổi màu.
    <b>Vây:</b> nhóm quân địch không còn nước đi sẽ đổi màu. Hết quân là thua.
  </p>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
/* ---------- BOARD MODEL ---------- */
// 25 points, index = row*5 + col
const N = 5, SIZE = N*N;
const idx = (r,c) => r*5+c;
const rc  = i => [Math.floor(i/5), i%5];

// Adjacency: orthogonal everywhere; diagonals only where lines are drawn.
// Diagonal lines exist on points where (r+c) is even.
function neighbors(i){
  const [r,c] = rc(i), out = [];
  const push = (rr,cc) => { if(rr>=0&&rr<5&&cc>=0&&cc<5) out.push(idx(rr,cc)); };
  push(r-1,c); push(r+1,c); push(r,c-1); push(r,c+1);
  if((r+c)%2===0){ push(r-1,c-1); push(r-1,c+1); push(r+1,c-1); push(r+1,c+1); }
  return out;
}
const ADJ = Array.from({length:SIZE}, (_,i)=>neighbors(i));

// Pairs of opposite neighbours through each point (for gánh detection)
function oppositePairs(i){
  const [r,c] = rc(i), pairs = [];
  const dirs = [[-1,0],[0,-1],[-1,-1],[-1,1]];
  for(const [dr,dc] of dirs){
    if(Math.abs(dr)===1 && Math.abs(dc)===1 && (r+c)%2!==0) continue;
    const a=[r+dr,c+dc], b=[r-dr,c-dc];
    if(a[0]>=0&&a[0]<5&&a[1]>=0&&a[1]<5&&b[0]>=0&&b[0]<5&&b[1]>=0&&b[1]<5)
      pairs.push([idx(a[0],a[1]), idx(b[0],b[1])]);
  }
  return pairs;
}
const PAIRS = Array.from({length:SIZE}, (_,i)=>oppositePairs(i));

// 0 = empty, 1 = white (bottom), 2 = black (top)
// Traditional layout, 8 per side:
//   5 on your back row, 2 on the outer edges of your 2nd row,
//   1 on the middle row at your left. Rotationally symmetric.
function initialBoard(){
  const b = new Array(SIZE).fill(0);
  for(let c=0;c<5;c++){ b[idx(0,c)] = 2; b[idx(4,c)] = 1; }
  b[idx(1,0)] = 2; b[idx(1,4)] = 2;   // black 2nd row edges
  b[idx(3,0)] = 1; b[idx(3,4)] = 1;   // white 2nd row edges (from white's side)
  b[idx(2,4)] = 2;                    // black's 8th piece, middle row
  b[idx(2,0)] = 1;                    // white's 8th piece, middle row
  return b;
}

/* ---------- RULES ---------- */
function legalMoves(board, from){
  return ADJ[from].filter(t => board[t] === 0);
}

function applyMove(board, from, to){
  const b = board.slice();
  const me = b[from];
  b[to] = me; b[from] = 0;
  applyGanh(b, to, me);
  applyVay(b, me);
  return b;
}

// Gánh: enemy sandwiched on both sides of the moved piece flips
function applyGanh(b, at, me){
  const foe = me === 1 ? 2 : 1;
  for(const [a,c] of PAIRS[at]){
    if(b[a] === foe && b[c] === foe){ b[a] = me; b[c] = me; }
  }
}

// Vây: any enemy group with no adjacent empty point flips
function applyVay(b, me){
  const foe = me === 1 ? 2 : 1;
  const seen = new Array(SIZE).fill(false);
  for(let i=0;i<SIZE;i++){
    if(b[i] !== foe || seen[i]) continue;
    const group = [], stack = [i];
    seen[i] = true;
    let free = false;
    while(stack.length){
      const cur = stack.pop();
      group.push(cur);
      for(const n of ADJ[cur]){
        if(b[n] === 0) free = true;
        else if(b[n] === foe && !seen[n]){ seen[n] = true; stack.push(n); }
      }
    }
    if(!free) for(const g of group) b[g] = me;
  }
}

function count(b, side){ return b.reduce((s,v)=>s+(v===side?1:0),0); }

function hasAnyMove(b, side){
  for(let i=0;i<SIZE;i++)
    if(b[i]===side && ADJ[i].some(n=>b[n]===0)) return true;
  return false;
}

/* ---------- STATE ---------- */
let board = initialBoard();
let turn = 1;            // 1 = white moves first
let myColor = null;      // 1 or 2, set on connect
let selected = null;
let hints = [];
let gameOver = false;
let conn = null, peer = null;

/* ---------- RENDER ---------- */
const svg = document.getElementById('board');
const M = 12, STEP = (100 - 2*M) / 4;
const px = i => { const [r,c] = rc(i); return [M + c*STEP, M + r*STEP]; };

function draw(){
  let s = '';
  // lines
  for(let i=0;i<SIZE;i++){
    const [x1,y1] = px(i);
    for(const n of ADJ[i]){
      if(n < i) continue;
      const [x2,y2] = px(n);
      s += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--line)" stroke-width="0.8"/>`;
    }
  }
  // hint dots
  for(const h of hints){
    const [x,y] = px(h);
    s += `<circle cx="${x}" cy="${y}" r="3" class="hint"/>`;
  }
  // pieces
  for(let i=0;i<SIZE;i++){
    const [x,y] = px(i);
    if(board[i] === 0){
      s += `<circle cx="${x}" cy="${y}" r="2" class="empty pt" data-i="${i}"/>`;
    } else {
      const cls = board[i] === 1 ? 'piece-w' : 'piece-b';
      const sel = selected === i ? ' sel' : '';
      s += `<circle cx="${x}" cy="${y}" r="6.5" class="${cls}${sel} pt" data-i="${i}"/>`;
    }
    // larger invisible tap target
    s += `<circle cx="${x}" cy="${y}" r="9" fill="transparent" class="pt" data-i="${i}"/>`;
  }
  svg.innerHTML = s;
  refreshPlayers();
}

function setStatus(t){ document.getElementById('status').textContent = t; }

// Updates both player cards: piece count, who is who, and whose turn it is.
function refreshPlayers(){
  document.getElementById('cw').textContent = count(board,1);
  document.getElementById('cb').textContent = count(board,2);

  const cards = {1: document.getElementById('pw'), 2: document.getElementById('pb')};
  const subs  = {1: document.getElementById('sw'), 2: document.getElementById('sb')};

  for(const side of [1,2]){
    const isMe = (side === myColor);
    let label;
    if(gameOver)      label = isMe ? 'Bạn' : 'Đối thủ';
    else if(!conn)    label = isMe ? 'Bạn' : 'Đang chờ…';
    else              label = isMe ? 'Bạn' : 'Đối thủ';
    subs[side].textContent = label;
    cards[side].classList.toggle('active', !gameOver && !!conn && turn === side);
  }
}

function updateStatus(){
  refreshPlayers();
  if(gameOver) return;
  if(!conn) return;
  const name = c => c === 1 ? 'Trắng' : 'Đen';
  if(turn === myColor) setStatus(`▶ Lượt bạn (${name(myColor)})`);
  else setStatus(`Đợi đối thủ (${name(turn)})…`);
}

function checkEnd(){
  const w = count(board,1), b = count(board,2);
  if(w === 0 || !hasAnyMove(board,1)){ finish(2); return true; }
  if(b === 0 || !hasAnyMove(board,2)){ finish(1); return true; }
  return false;
}

function finish(winner){
  gameOver = true;
  const won = winner === myColor;
  setStatus(won ? '🎉 Bạn thắng!' : 'Bạn thua.');
  document.getElementById('drawBtn').style.display = 'none';
  document.getElementById('rematchBtn').style.display = 'block';
  refreshPlayers();
}

/* ---------- INPUT ---------- */
svg.addEventListener('click', e => {
  const t = e.target.closest('.pt');
  if(!t) return;
  const i = +t.dataset.i;
  if(gameOver || !conn || turn !== myColor) return;

  if(selected !== null && hints.includes(i)){
    doMove(selected, i, true);
    return;
  }
  if(board[i] === myColor){
    selected = i;
    hints = legalMoves(board, i);
  } else {
    selected = null; hints = [];
  }
  draw();
});

function doMove(from, to, broadcast){
  board = applyMove(board, from, to);
  turn = turn === 1 ? 2 : 1;
  selected = null; hints = [];
  draw();
  if(broadcast && conn && conn.open) conn.send({t:'move', from, to});
  if(!checkEnd()) updateStatus();
}

/* ---------- NETWORK ---------- */
function wire(c){
  conn = c;
  conn.on('data', m => {
    if(m.t === 'move'){ doMove(m.from, m.to, false); }
    if(m.t === 'rematch'){ resetGame(); setStatus('Ván mới bắt đầu.'); }
    if(m.t === 'draw-offer'){
      if(confirm('Đối thủ xin hòa. Bạn đồng ý?')){
        conn.send({t:'draw-accept'});
        endDraw();
      } else {
        conn.send({t:'draw-decline'});
      }
    }
    if(m.t === 'draw-accept'){ endDraw(); }
    if(m.t === 'draw-decline'){ setStatus('Đối thủ từ chối hòa.'); setTimeout(updateStatus, 1800); }
  });
  conn.on('close', () => { setStatus('Mất kết nối.'); conn = null; refreshPlayers(); });
  conn.on('error', () => setStatus('Lỗi kết nối.'));
  document.getElementById('createBtn').style.display = 'none';
  document.getElementById('linkBox').style.display = 'none';
  document.getElementById('drawBtn').style.display = 'block';
  updateStatus();
}

function resetGame(){
  board = initialBoard();
  turn = 1; selected = null; hints = []; gameOver = false;
  document.getElementById('rematchBtn').style.display = 'none';
  if(conn) document.getElementById('drawBtn').style.display = 'block';
  draw(); updateStatus();
}

let matchUrl = '';

// Copy link. navigator.clipboard needs HTTPS or localhost, so fall back to execCommand.
document.getElementById('copyBtn').onclick = async () => {
  const btn = document.getElementById('copyBtn');
  const input = document.getElementById('link');
  let ok = false;
  try {
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(matchUrl);
      ok = true;
    } else {
      input.select();
      input.setSelectionRange(0, 99999);
      ok = document.execCommand('copy');
    }
  } catch(e){ ok = false; }

  if(ok){
    btn.textContent = '✓ Đã sao chép!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '📋 Sao chép link'; btn.classList.remove('ok'); }, 1800);
  } else {
    btn.textContent = 'Hãy chọn và sao chép thủ công';
    input.select();
    setTimeout(() => { btn.textContent = '📋 Sao chép link'; }, 2500);
  }
};

const hostId = location.hash.slice(1);

peer = new Peer();
peer.on('error', err => setStatus('Lỗi: ' + err.type));

if(hostId){
  // ---- GUEST ----
  myColor = 2;
  setStatus('Đang kết nối…');
  peer.on('open', () => {
    const c = peer.connect(hostId, {reliable:true});
    c.on('open', () => { wire(c); setStatus('Đã kết nối! Bạn cầm quân Đen.'); updateStatus(); });
    c.on('error', () => setStatus('Không kết nối được. Kiểm tra lại link.'));
  });
  document.getElementById('createBtn').style.display = 'none';
} else {
  // ---- HOST ----
  myColor = 1;
  peer.on('open', id => {
    setStatus('Bấm "Tạo ván mới" để lấy link.');
    document.getElementById('createBtn').onclick = () => {
      matchUrl = location.origin + location.pathname + '#' + id;
      document.getElementById('link').value = matchUrl;
      document.getElementById('linkBox').style.display = 'block';
      document.getElementById('createBtn').style.display = 'none';
      setStatus('Đang chờ đối thủ vào…');
    };
  });
  peer.on('connection', c => {
    c.on('open', () => { wire(c); setStatus('Đối thủ đã vào! Bạn cầm quân Trắng, đi trước.'); updateStatus(); });
  });
}

function endDraw(){
  gameOver = true;
  setStatus('🤝 Ván hòa.');
  document.getElementById('drawBtn').style.display = 'none';
  document.getElementById('rematchBtn').style.display = 'block';
  refreshPlayers();
}

document.getElementById('drawBtn').onclick = () => {
  if(conn && conn.open){
    conn.send({t:'draw-offer'});
    setStatus('Đã gửi lời xin hòa…');
  }
};

document.getElementById('rematchBtn').onclick = () => {
  if(conn && conn.open) conn.send({t:'rematch'});
  resetGame();
};

draw();
</script>
</body>
</html>
